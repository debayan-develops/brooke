# Use the official GitLab Terraform image which includes 'gitlab-terraform' helper
image: registry.gitlab.com/gitlab-org/terraform-images/stable:latest

variables:
  # The directory where your .tf files are located
  TF_ROOT: ${CI_PROJECT_DIR}/terraform
  # Internal GitLab helper variables for State management
  TF_STATE_NAME: default
  TF_ADDRESS: ${CI_API_V4_URL}/projects/${CI_PROJECT_ID}/terraform/state/${TF_STATE_NAME}
  
  # Mapping your GitLab Variables to Terraform Variables
  # Terraform automatically picks up environment variables starting with TF_VAR_
  TF_VAR_gitlab_token: ${GITLAB_ACCESS_TOKEN}
  TF_VAR_db_password: ${DB_PASSWORD}

stages:
  - prepare
  - validate
  - plan
  - deploy

# 1. Initialize the backend (GitLab-managed state)
init:
  stage: prepare
  script:
    - cd ${TF_ROOT}
    - gitlab-terraform init

# 2. Check for syntax errors
validate:
  stage: validate
  script:
    - cd ${TF_ROOT}
    - gitlab-terraform validate

# 3. Create a plan and save it as an artifact
plan:
  stage: plan
  script:
    - cd ${TF_ROOT}
    - gitlab-terraform plan
    - gitlab-terraform plan-json
  artifacts:
    name: plan
    paths:
      - ${TF_ROOT}/plan.cache
    reports:
      terraform: ${TF_ROOT}/plan.json

# 4. Apply the changes (Manual trigger for safety)
deploy_aws:
  stage: deploy
  script:
    - cd ${TF_ROOT}
    - gitlab-terraform apply
  only:
    - main
  when: manual # This adds a 'Play' button in GitLab so you approve the costs